# Self-hosting docker-compose for crit-web
# Quick start: docker compose up
# Full guide: https://crit.md/self-hosting
services:
  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: crit
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: crit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crit"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/tomasz-tomczyk/crit-web:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://crit:changeme@db:5432/crit
      SECRET_KEY_BASE: "generate-a-secret-see-readme"
      SELFHOSTED: "true"
      ADMIN_PASSWORD: "changeme"
      PHX_HOST: localhost
      PHX_SERVER: "true"
      PORT: "4000"
    command: sh -c "/app/bin/migrate && /app/bin/server"

volumes:
  pgdata:
